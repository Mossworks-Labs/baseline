# ─── Domain ───────────────────────────────────────────────────────────────────
domain: example.com

# ─── Cloudflare ───────────────────────────────────────────────────────────────
cloudflare:
  email: ""        # Cloudflare account email
  apiToken: ""     # API token with Zone:DNS:Edit + Zone:Zone:Read

# ─── ClusterIssuer ────────────────────────────────────────────────────────────
clusterIssuer:
  enabled: true
  name: letsencrypt-prod
  server: https://acme-v02.api.letsencrypt.org/directory

# ─── Certificate ──────────────────────────────────────────────────────────────
certificate:
  enabled: true
  secretName: baseline-tls
  extraDnsNames:
    - "*.local.example.com"

# ─── cert-manager (subchart) ─────────────────────────────────────────────────
cert-manager:
  enabled: true
  crds:
    enabled: true

# ─── Cloudflare Tunnel ────────────────────────────────────────────────────────
# When enabled, deploys cloudflared and (via tunnel-dns-job.yaml) ensures
# every hostname in `ingress[*]` has a proxied CNAME -> <tunnelId>.cfargotunnel.com
# in Cloudflare DNS. Don't pre-create those records manually — the post-install
# Job upserts them on every helm run.
#
# Ingresses on those hostnames must also tell external-dns to keep its hands
# off, otherwise external-dns races the Job and writes an A record to the
# cluster's internal IP (unreachable externally). Use the helper:
#
#   metadata:
#     annotations:
#       {{- include "baseline.tunnelIngressAnnotations" . | nindent 4 }}
#
# or just hard-code:
#
#   external-dns.alpha.kubernetes.io/exclude: "true"
cloudflareTunnel:
  enabled: false
  tunnelId: ""
  imageTag: "2026.3.0"
  replicas: 1
  credentials: {}   # tunnel credentials JSON object
  ingress: []       # list of { hostname, service, originRequest }

# ─── OneUptime (subchart — observability platform) ───────────────────────────
# When oneuptimeEnabled=true, deploys OneUptime for uptime monitoring, status
# pages, incident management, APM, logs, and error tracking. Uses the parent
# chart's PostgreSQL (external DB mode) to avoid naming collisions; keeps its
# own Redis + ClickHouse. Access via status.<domain> subdomain through nginx-ingress.
# Note: condition key is "oneuptimeEnabled" (top-level) because OneUptime's
# JSON schema rejects unknown properties like "enabled" under the oneuptime key.
oneuptimeEnabled: false

oneuptime:
  otel:
    token: ""     # Shared telemetry ingestion token (UUID). Seeded into OneUptime DB on deploy.
    agentKey: ""  # Infrastructure agent secret key (UUID). Seeded as a Server monitor.
  host: status.example.com
  httpProtocol: https
  # Disable built-in TLS — baseline cert-manager handles this
  ssl:
    provision: false
  # Disable KEDA (not needed for single-node k3s)
  keda:
    enabled: false
  # Disable test server
  testServer:
    enabled: false
  # Use parent chart's PostgreSQL (avoids naming collision)
  postgresql:
    enabled: false
  externalPostgres:
    host: ""           # Set to parent's PostgreSQL service (e.g. craft-postgresql)
    port: 5432
    username: craft
    password: craft    # Override in values-dev.yaml
    database: oneuptime
    ssl:
      enabled: false
  # Override nginx to ClusterIP — nginx-ingress handles external routing
  nginx:
    service:
      type: ClusterIP

# ─── external-dns (subchart — kubernetes-sigs/external-dns) ──────────────────
external-dns:
  enabled: true
  provider:
    name: cloudflare
  domainFilters:
    - example.com
  policy: upsert-only
  txtOwnerId: baseline
  sources:
    - ingress
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: baseline-cloudflare
          key: api-token
