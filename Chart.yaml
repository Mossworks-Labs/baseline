apiVersion: v2
name: baseline
description: Cluster baseline — cert-manager and external-dns (Cloudflare)
type: application
version: 0.2.0
appVersion: "1.0.0"

dependencies:
  - name: cert-manager
    version: "1.17.1"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled

  - name: external-dns
    version: "1.20.0"
    repository: https://kubernetes-sigs.github.io/external-dns/
    condition: external-dns.enabled
