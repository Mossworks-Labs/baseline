name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm dependency update .
      - run: helm lint .
      - run: helm template baseline . --debug > /dev/null
      - name: Summary
        run: |
          echo "### Helm Lint :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart templates render successfully." >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish Chart
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: helm-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
      - name: Package chart
        run: |
          helm dependency update .
          helm package . --destination .deploy
      - name: Update Helm repo index
        run: |
          # Fetch existing index from gh-pages if it exists
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git show gh-pages:index.yaml > .deploy/old-index.yaml 2>/dev/null; then
            helm repo index .deploy --url https://mossworks-labs.github.io/baseline/ --merge .deploy/old-index.yaml
          else
            helm repo index .deploy --url https://mossworks-labs.github.io/baseline/
          fi
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          keep_files: true
