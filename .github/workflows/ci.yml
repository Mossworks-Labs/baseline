name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm dependency update .
      - run: helm lint .
      - run: helm template baseline . --debug > /dev/null
      - name: Summary
        run: |
          echo "### Helm Lint :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart templates render successfully." >> "$GITHUB_STEP_SUMMARY"
