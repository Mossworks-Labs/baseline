{{- if .Values.oneuptimeEnabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "baseline.fullname" . }}-oneuptime
  labels:
    {{- include "baseline.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  {{- if .Values.certificate.enabled }}
  tls:
    - secretName: {{ include "baseline.fullname" . }}-tls
      hosts:
        - {{ .Values.oneuptime.host | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.oneuptime.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-nginx
                port:
                  number: 80
{{- end }}
