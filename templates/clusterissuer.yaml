{{- if .Values.clusterIssuer.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuer.name }}
  labels:
    {{- include "baseline.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.cloudflare.email }}
    server: {{ .Values.clusterIssuer.server }}
    privateKeySecretRef:
      name: {{ .Values.clusterIssuer.name }}-account-key
    solvers:
      - dns01:
          cloudflare:
            email: {{ .Values.cloudflare.email }}
            apiTokenSecretRef:
              name: {{ include "baseline.fullname" . }}-cloudflare
              key: api-token
{{- end }}
